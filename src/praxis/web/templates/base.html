<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Praxis{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand">
      <span class="brand-mark">P</span>
      <span>Praxis</span>
    </a>
    <nav aria-label="Primary navigation">
      <a href="/" class="{{ 'active' if request.url.path == '/' else '' }}">My learning</a>
      <a href="/status" class="{{ 'active' if request.url.path == '/status' else '' }}">
        <span class="nav-status-dot"></span>System status
      </a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <span>Praxis local learning workspace</span>
    <a href="/docs">API docs</a>
  </footer>
</body>
</html>
